<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:380px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e0e0e0}
.header{background:#111;padding:14px 16px;border-bottom:1px solid #222;display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:16px;color:#fff}.header h1 span{color:#a78bfa}
.header .ver{font-size:11px;color:#666}
.main{padding:16px}

.btn{display:block;width:100%;padding:12px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .15s;text-align:center;margin-bottom:8px}
.btn-primary{background:#7c3aed;color:#fff}
.btn-primary:hover{background:#6d28d9}
.btn-green{background:#14532d;color:#22c55e}
.btn-green:hover{background:#166534}
.btn-blue{background:#1e3a5f;color:#60a5fa}
.btn-blue:hover{background:#1e40af}
.btn:disabled{opacity:0.4;cursor:not-allowed}

.status{padding:12px;border-radius:8px;font-size:13px;margin-bottom:12px;line-height:1.5}
.status-idle{background:#111;border:1px solid #222;color:#999}
.status-ok{background:#14532d;border:1px solid #166534;color:#22c55e}
.status-err{background:#450a0a;border:1px solid #7f1d1d;color:#ef4444}
.status-working{background:#1a1a2e;border:1px solid #312e81;color:#a78bfa}

.platform{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#111;border:1px solid #222;border-radius:6px;margin-bottom:12px;font-size:13px}
.platform .dot{width:8px;height:8px;border-radius:50%}
.dot-ok{background:#22c55e}
.dot-err{background:#ef4444}
.dot-unknown{background:#666}

.result{background:#111;border:1px solid #222;border-radius:8px;padding:12px;margin-top:12px;display:none}
.result h3{font-size:13px;color:#999;margin-bottom:8px}
.result .preview{font-family:'SF Mono',Consolas,monospace;font-size:11px;color:#ccc;max-height:200px;overflow-y:auto;white-space:pre-wrap;line-height:1.5;background:#0a0a0a;padding:8px;border-radius:4px}
.result .stats{font-size:12px;color:#666;margin-top:8px}

.target{margin-top:12px}
.target label{display:block;font-size:12px;color:#999;margin-bottom:4px}
.target select{width:100%;padding:8px;background:#111;border:1px solid #333;border-radius:6px;color:#fff;font-size:13px}

.footer{padding:12px 16px;border-top:1px solid #222;text-align:center}
.footer a{color:#666;font-size:11px;text-decoration:none}
.footer a:hover{color:#999}
</style>
</head>
<body>

<div class="header">
  <h1>Hand<span>off</span></h1>
  <span class="ver">v0.1.0</span>
</div>

<div class="main">
  <div class="platform" id="platformInfo">
    <div class="dot dot-unknown" id="platformDot"></div>
    <span id="platformName">Detecting platform...</span>
  </div>

  <div class="status status-idle" id="status">
    Click "Extract Conversation" to capture this chat and generate portable context for any other AI agent.
  </div>

  <button class="btn btn-primary" id="extractBtn">
    Extract Conversation
  </button>

  <div class="result" id="result">
    <h3>Context Generated</h3>
    <div class="stats" id="stats"></div>
    <div class="preview" id="preview"></div>
    <button class="btn btn-green" id="copyBtn" style="margin-top:8px">
      Copy to Clipboard
    </button>

    <div class="target">
      <label>Quick paste into:</label>
      <select id="targetAgent">
        <option value="">— Select target agent —</option>
        <option value="https://chatgpt.com/">ChatGPT</option>
        <option value="https://claude.ai/new">Claude</option>
        <option value="https://gemini.google.com/app">Gemini</option>
        <option value="https://copilot.microsoft.com/">Copilot</option>
      </select>
    </div>
  </div>
</div>

<div class="footer">
  <a href="https://github.com/rofomtl00/Handoff" target="_blank">GitHub</a> ·
  <a href="https://rofomtl00.github.io/Handoff/" target="_blank">Website</a>
</div>

<script src="popup.js"></script>
</body>
</html>
